<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Levain — Sourdough Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      (function(){var q=window.location.search.slice(1).split('&').reduce(function(a,v){var kv=v.split('=');if(kv[0]==='p')a.p=decodeURIComponent(kv[1].replace(/~and~/g,'&'));if(kv[0]==='q')a.q='?'+decodeURIComponent(kv[1].replace(/~and~/g,'&'));return a},{});if(q.p!=null)window.history.replaceState(null,null,window.location.pathname.split('/').slice(0,2).join('/')+q.p+(q.q||'')+window.location.hash);}());
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
